  - name: linkedin
    module: pyconnectors.connectors.apps.social.linkedin
    attr: LinkedInConnector
    type: social
    auth: [oauth2]
    tags: [social, linkedin, posts, profile]
    status: stable
    description: "Connecteur LinkedIn API (posts, profil, company pages)."

  - name: facebook
    module: pyconnectors.connectors.apps.social.facebook
    attr: FacebookConnector
